name: Deploy Attendee

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            echo "===== CONNECTED ====="

            cd /root/attendee || exit

            echo "===== UPDATE CODE ====="
            git pull origin main

            echo "===== BACKEND (Node) ====="
            cd server || exit

            npm install

            # ⚠️ जर index.js नसेल तर बदल (server.js / app.js)
            pm2 restart attendee-backend || pm2 start index.js --name attendee-backend

            echo "===== FRONTEND ====="
            cd ../client || exit

            npm install
            rm -rf .next
            npm run build

            pm2 delete attendee-frontend || true
            pm2 start "npm run start -- -p 3002" --name attendee-frontend

            pm2 save

            echo "===== DONE ====="

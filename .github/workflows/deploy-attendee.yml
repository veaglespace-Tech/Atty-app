name: Deploy Attendee

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}

          script: |
            set -e

            echo "===== CONNECTED ====="

            cd /root/attendee || exit 1

            # pull latest code
            git fetch origin main
            git reset --hard origin/main

            echo "===== LATEST COMMIT ====="
            git log -1 --oneline

            # ================= BACKEND =================
            echo "===== BACKEND ====="
            cd server || exit 1

            if [ ! -f .env ]; then
              echo "❌ Missing server/.env"
              exit 1
            fi

            set -a
            . ./.env
            set +a

            npm ci
            npx prisma migrate deploy

            # restart backend
            pm2 restart attendee-server || pm2 start npm --name "attendee-server" -- start

            # ================= FRONTEND =================
            echo "===== FRONTEND CLEAN BUILD ====="
            cd ../client || exit 1

            # 🔥 FULL CLEAN (your requirement)
            rm -rf .next node_modules package-lock.json

            npm install

            npm run build

            # safety check
            test -f .next/BUILD_ID || (echo "❌ Build failed" && exit 1)

            # restart frontend
            pm2 restart attendee-client || pm2 start npm --name "attendee-client" -- start

            pm2 save

            echo "===== DEPLOY SUCCESS ====="

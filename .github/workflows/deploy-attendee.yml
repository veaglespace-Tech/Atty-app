name: Deploy Attendee

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            echo "===== CONNECTED ====="

            cd /root/attendee

            echo "===== UPDATE CODE ====="
            git fetch origin
            git reset --hard origin/main

            echo "===== BACKEND ====="
            cd server
            mvn clean install -DskipTests

            pm2 restart attendee-server || true

            echo "===== FRONTEND ====="
            cd ../client
            rm -rf .next
            npm install
            npm run build

            pm2 restart attendee-client || true

            pm2 save

            echo "===== DONE ====="

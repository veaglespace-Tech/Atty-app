name: Deploy Attendee

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            echo "===== CONNECTED TO VPS ====="

            cd /root/attendee || exit

            git fetch origin main
            git checkout main
            git reset --hard origin/main

            echo "===== BACKEND ====="
            cd /root/attendee/server

            export $(grep -v '^#' .env | xargs)

            npm ci
            npx prisma migrate deploy

            pm2 describe attendee-server > /dev/null \
              && pm2 restart attendee-server \
              || pm2 start npm --name "attendee-server" -- start

            echo "===== FRONTEND ====="
            cd /root/attendee/client

            rm -rf .next
            npm ci
            npm run build

            pm2 describe attendee-client > /dev/null \
              && pm2 restart attendee-client \
              || pm2 start npm --name "attendee-client" -- start

            pm2 save

            echo "===== DEPLOYMENT DONE ====="

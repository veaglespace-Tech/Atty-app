name: Deploy Attendee

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}

          script: |
            set -e  # ❗ IMPORTANT: fail immediately if any command fails

            echo "===== CONNECTED ====="

            cd /root/attendee

            git fetch origin main
            git reset --hard origin/main

            echo "===== BACKEND ====="
            cd server

            set -a
            . ./.env
            set +a

            npm ci
            npx prisma migrate deploy

            pm2 describe attendee-server > /dev/null \
              && pm2 restart attendee-server \
              || pm2 start npm --name "attendee-server" -- start

            echo "===== FRONTEND ====="
            cd ../client

            rm -rf .next node_modules  # ✅ FULL CLEAN (important)

            npm ci

            echo "===== BUILDING NEXT ====="
            npm run build

            # ✅ verify build actually exists
            if [ ! -f ".next/prerender-manifest.json" ]; then
              echo "❌ Build failed: prerender-manifest.json missing"
              exit 1
            fi

            echo "✅ Build verified"

            pm2 describe attendee-client > /dev/null \
              && pm2 restart attendee-client \
              || pm2 start npm --name "attendee-client" -- start

            pm2 save

            echo "===== DONE ====="

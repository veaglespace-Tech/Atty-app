name: Deploy Attendee

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          timeout: 180s

          script: |
            set -e

            echo "===== CONNECTED ====="

            cd /root/attendee || exit 1

            # pull latest code
            git fetch origin main
            git reset --hard origin/main

            echo "===== LATEST COMMIT ====="
            git log -1 --oneline

            # ================= BACKEND =================
            echo "===== BACKEND ====="
            cd server || exit 1

            if [ ! -f .env ]; then
              echo "❌ Missing server/.env"
              exit 1
            fi

            set -a
            . ./.env
            set +a

            npm install

            # restart backend
            NODE_ENV=production pm2 restart attendee-server --update-env || NODE_ENV=production pm2 start npm --name "attendee-server" -- start

            # verify the API is actually serving before continuing
            BACKEND_PORT="${PORT:-5000}"
            echo "⏳ Waiting for backend to start..."
            sleep 10
            for attempt in 1 2 3 4 5 6 7 8; do
              if curl -fsS "http://127.0.0.1:${BACKEND_PORT}/healthz" > /dev/null; then
                echo "===== BACKEND READY ====="
                break
              fi

              if [ "$attempt" -eq 8 ]; then
                echo "❌ Backend health check failed on port ${BACKEND_PORT}"
                pm2 logs attendee-server --lines 80 --nostream || true
                exit 1
              fi

              sleep 5
            done

            # ================= FRONTEND =================
            echo "===== FRONTEND CLEAN BUILD ====="
            cd ../client || exit 1

            # 🔥 FULL CLEAN (your requirement)
            rm -rf .next node_modules

            npm install

            NODE_ENV=production npm run build

            # safety check
            test -f .next/BUILD_ID || (echo "❌ Build failed" && exit 1)

            # restart frontend
            NODE_ENV=production pm2 restart attendee-client --update-env || NODE_ENV=production pm2 start npm --name "attendee-client" -- start

            pm2 save

            echo "===== DEPLOY SUCCESS ====="


```yml
name: Deploy Attendee

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            echo "===== CONNECTED TO VPS ====="

            echo "===== GO TO PROJECT ====="
            cd /root/attendee

            echo "===== UPDATE CODE ====="
            git fetch origin main
            git checkout main
            git reset --hard origin/main

            echo "===== VERIFY LATEST COMMIT ====="
            git log -1

            echo "===== BACKEND SETUP ====="
            cd /root/attendee/server
            npm ci
            npx prisma migrate deploy

            echo "===== RELOAD BACKEND ====="
            pm2 reload attendee-server || pm2 start npm --name "attendee-server" -- start

            echo "===== FRONTEND BUILD ====="
            cd /root/attendee/client
            npm ci
            npm run build

            echo "===== RELOAD FRONTEND ====="
            pm2 reload attendee-client || pm2 start npm --name "attendee-client" -- start

            echo "===== SAVE PM2 ====="
            pm2 save

            echo "===== DEPLOYMENT DONE ====="
```

name: Deploy Attendee

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}

          script: |
            set -e

            echo "===== CONNECTED ====="

            cd /root/attendee || exit 1

            # pull latest code
            git fetch origin main
            git reset --hard origin/main

            echo "===== BACKEND START ====="
            cd server || exit 1

            # safe env load
            if [ -f .env ]; then
              export $(grep -v '^#' .env | xargs)
            else
              echo "❌ server/.env missing"
              exit 1
            fi

            # clean install backend
            rm -rf node_modules
            npm ci

            # prisma safe deploy (NO resolve hack anymore)
            npx prisma migrate deploy

            # restart backend safely
            pm2 reload attendee-server --update-env || pm2 start npm --name "attendee-server" -- start

            echo "===== FRONTEND START ====="
            cd ../client || exit 1

            # full clean build
            rm -rf .next node_modules

            npm ci

            echo "===== BUILDING NEXT APP ====="

            # memory-safe build (IMPORTANT for VPS)
            NODE_OPTIONS="--max-old-space-size=1024" npm run build

            # strict build validation
            test -f .next/BUILD_ID || (echo "❌ Next.js build failed" && exit 1)

            echo "===== RESTART FRONTEND ====="

            pm2 reload attendee-client --update-env || pm2 start npm --name "attendee-client" -- start

            pm2 save

            echo "===== DEPLOY SUCCESS ====="

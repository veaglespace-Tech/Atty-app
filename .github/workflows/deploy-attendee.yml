name: Deploy Attendee

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            echo "===== CONNECTED ====="

            # go to project
            cd /root/attendee || exit

            # update code
            git fetch origin main
            git reset --hard origin/main

            echo "===== BACKEND ====="
            cd server || exit

            # load env
            export $(grep -v '^#' .env | xargs)

            # install + migrate
            npm ci
            npx prisma migrate deploy

            # restart backend safely
            pm2 describe attendee-server > /dev/null \
              && pm2 restart attendee-server \
              || pm2 start npm --name "attendee-server" -- start

            echo "===== FRONTEND ====="
            cd ../client || exit

            rm -rf .next
            npm ci
            npm run build

            # restart frontend safely
            pm2 describe attendee-client > /dev/null \
              && pm2 restart attendee-client \
              || pm2 start npm --name "attendee-client" -- start

            # save pm2
            pm2 save

            echo "===== DONE ====="

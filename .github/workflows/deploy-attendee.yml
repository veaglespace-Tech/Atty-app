name: Deploy Attendee

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            echo "===== CONNECTED TO VPS ====="

            echo "===== GO TO PROJECT ====="
            cd /root/attendee || exit

            echo "===== CURRENT BRANCH ====="
            git branch

            echo "===== FORCE UPDATE CODE ====="
            git fetch --all
            git reset --hard origin/main

            echo "===== VERIFY LATEST COMMIT ====="
            git log -1

            echo "===== BACKEND SETUP ====="
            cd /root/attendee/server
            npm install

            echo "===== RESTART BACKEND ====="
            pm2 delete attendee-server || true
            pm2 start npm --name "attendee-server" -- start

            echo "===== FRONTEND BUILD ====="
            cd /root/attendee/client

            rm -rf .next
            npm install
            npm run build

            echo "===== RESTART FRONTEND ====="
            pm2 delete attendee-client || true
            pm2 start "npm run start" --name "attendee-client"

            echo "===== SAVE PM2 ====="
            pm2 save

            echo "===== DEPLOYMENT DONE ====="

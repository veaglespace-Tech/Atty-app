name: Deploy Attendee

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}

          script: |
            set -e
            set -x   # 🔍 DEBUG (remove later if you want)

            echo "===== CONNECTED ====="

            cd /root/attendee || exit 1

            git fetch origin main
            git reset --hard origin/main

            echo "===== BACKEND ====="
            cd server || exit 1

            # ✅ SAFE ENV LOAD
            if [ -f .env ]; then
              export $(grep -v '^#' .env | xargs)
            else
              echo "❌ Missing server/.env"
              exit 1
            fi

            # install deps
            rm -rf node_modules
            npm ci

            # prisma migrate
            npx prisma migrate deploy

            # restart backend
            pm2 describe attendee-server > /dev/null \
              && pm2 restart attendee-server \
              || pm2 start npm --name "attendee-server" -- start

            echo "===== FRONTEND ====="
            cd ../client || exit 1

            # clean everything properly
            rm -rf .next node_modules

            npm ci

            echo "===== BUILDING NEXT ====="
            npm run build

            # ✅ VERIFY BUILD (fix for your error)
            if [ ! -f ".next/prerender-manifest.json" ]; then
              echo "❌ Build failed: prerender-manifest.json missing"
              exit 1
            fi

            echo "✅ Build OK"

            # restart frontend
            pm2 describe attendee-client > /dev/null \
              && pm2 restart attendee-client \
              || pm2 start npm --name "attendee-client" -- start

            pm2 save

            echo "===== DONE ====="
